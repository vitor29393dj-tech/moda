<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier — Login Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bege-claro: #F7F3EE; /* Cor de fundo que aparece no seu catálogo */
            --dourado: #B8965A;     /* Cor dos botões e detalhes */
            --cinza-escuro: #2C2B29; /* Cor do cabeçalho e textos principais */
            --branco: #FFFFFF;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bege-claro);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: var(--branco);
            padding: 40px;
            border-radius: 2px; /* Bordas mais secas como no seu design */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .logo-login {
            font-family: serif; /* Simula o estilo do seu logo ATELIER */
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--cinza-escuro);
            margin-bottom: 10px;
            display: block;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #E0E0E0;
            background: #FAFAFA;
            border-radius: 0; /* Design retangular como os filtros do catálogo */
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--dourado);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--cinza-escuro);
            color: var(--bege-claro);
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.4s;
        }

        button:hover {
            background-color: var(--dourado);
            color: var(--branco);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <span class="logo-login">ATELIER</span>
        <p class="subtitle">Módulo de Gerenciamento</p>

        <form action="../controllers/AuthController.php" method="POST">
            <input type="text" name="usuario" placeholder="USUÁRIO" required>
            <input type="password" name="senha" placeholder="SENHA" required>
            <button type="submit">Acessar Painel</button>
        </form>
    </div>

</body>
</html>
